<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔒 locklock</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff5f7;
      font-family: 'Nunito', sans-serif;
    }
    .card {
      background: white;
      border-radius: 30px;
      padding: 40px 32px;
      width: 360px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(255,150,170,0.15);
    }
    h2 { color: #ff6b8a; font-size: 1.3rem; margin-bottom: 20px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #ffb3c6;
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus { border-color: #ff6b8a; }
    button {
      width: 100%;
      padding: 13px;
      background: #ff6b8a;
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }
    button:hover { background: #ff4d73; transform: translateY(-2px); }
    .result-box {
      background: #fff0f3;
      border: 2px solid #ffb3c6;
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
      word-break: break-all;
      font-size: 0.8rem;
      color: #ff6b8a;
      display: none;
    }
    .copy-btn {
      background: #fff0f3;
      color: #ff6b8a;
      border: 2px solid #ffb3c6;
      margin-top: 8px;
      font-size: 0.9rem;
    }
    .copy-btn:hover { background: #ffb3c6; color: white; }
    .avatar {
      width: 100px; height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ffb3c6;
      margin-bottom: 14px;
    }
    .btn-link {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #fff0f3; color: #ff6b8a;
      text-decoration: none; font-weight: 700;
      border-radius: 14px; padding: 13px;
      margin-bottom: 10px;
      border: 2px solid #ffb3c6;
      transition: all 0.2s;
    }
    .btn-link:hover { background: #ff6b8a; color: white; border-color: #ff6b8a; }
    .error { color: #ff4d73; font-size: 0.85rem; margin-top: 8px; }
    .footer { margin-top: 20px; font-size: 0.75rem; color: #ddd; }
    .tab-btns { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn {
      flex: 1; padding: 10px;
      background: #fff0f3; color: #ff6b8a;
      border: 2px solid #ffb3c6; border-radius: 12px;
      font-size: 0.9rem; font-weight: 700;
    }
    .tab-btn.active { background: #ff6b8a; color: white; border-color: #ff6b8a; }
    #lock-section, #unlock-section { display: none; }
  </style>
</head>
<body>
<div class="card">
  <h2>🔒 locklock</h2>

  <div class="tab-btns">
    <button class="tab-btn active" onclick="showTab('lock')">🔐 잠그기</button>
    <button class="tab-btn" onclick="showTab('unlock')">🔓 열기</button>
  </div>

  <!-- 잠그기 섹션 -->
  <div id="lock-section">
    <input type="text" id="img-url" placeholder="🖼️ 이미지 URL (선택)" />
    <input type="text" id="link1" placeholder="🔗 링크 1 URL" />
    <input type="text" id="link1-name" placeholder="링크 1 이름 (예: 내 인스타)" />
    <input type="text" id="link2" placeholder="🔗 링크 2 URL" />
    <input type="text" id="link2-name" placeholder="링크 2 이름 (예: 내 블로그)" />
    <input type="password" id="lock-pw" placeholder="🔑 비밀번호 설정" />
    <button onclick="lockIt()">잠그기 🔒</button>
    <div class="result-box" id="result-box">
      <div id="result-url"></div>
      <button class="copy-btn" onclick="copyUrl()">📋 복사하기</button>
    </div>
  </div>

  <!-- 열기 섹션 -->
  <div id="unlock-section">
    <input type="password" id="unlock-pw" placeholder="🔑 비밀번호 입력" />
    <button onclick="unlockIt()">열기 🔓</button>
    <p class="error" id="error-msg"></p>
    <div id="unlocked-content" style="display:none; margin-top:16px;">
      <img class="avatar" id="show-img" src="" alt=""/>
      <div id="show-links"></div>
    </div>
  </div>

  <p class="footer">made with 💗</p>
</div>

<script>
  // 탭 초기화
  function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='lock'&&i===0)||(tab==='unlock'&&i===1)));
    document.getElementById('lock-section').style.display = tab==='lock' ? 'block' : 'none';
    document.getElementById('unlock-section').style.display = tab==='unlock' ? 'block' : 'none';
  }

  // URL에 #data 있으면 자동으로 열기 탭
  window.onload = () => {
    if (location.hash && location.hash.length > 1) showTab('unlock');
    else showTab('lock');
  };

  function lockIt() {
    const data = {
      img: document.getElementById('img-url').value,
      l1: document.getElementById('link1').value,
      l1n: document.getElementById('link1-name').value || '링크 1',
      l2: document.getElementById('link2').value,
      l2n: document.getElementById('link2-name').value || '링크 2',
    };
    const pw = document.getElementById('lock-pw').value;
    if (!pw) return alert('비밀번호를 입력해주세요!');
    if (!data.l1 && !data.l2) return alert('링크를 하나 이상 입력해주세요!');

    const encrypted = CryptoJS.AES.encrypt(JSON.stringify(data), pw).toString();
    const encoded = btoa(encrypted).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    const url = location.href.split('#')[0] + '#' + encoded;

    document.getElementById('result-url').textContent = url;
    document.getElementById('result-box').style.display = 'block';
  }

  function copyUrl() {
    navigator.clipboard.writeText(document.getElementById('result-url').textContent);
    alert('복사됐어요! 🎉');
  }

  function unlockIt() {
    const hash = location.hash.slice(1);
    const pw = document.getElementById('unlock-pw').value;
    document.getElementById('error-msg').textContent = '';

    try {
      const encrypted = atob(hash.replace(/-/g,'+').replace(/_/g,'/'));
      const bytes = CryptoJS.AES.decrypt(encrypted, pw);
      const data = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));

      if (data.img) {
        document.getElementById('show-img').src = data.img;
        document.getElementById('show-img').style.display = 'block';
      } else {
        document.getElementById('show-img').style.display = 'none';
      }

      let linksHtml = '';
      if (data.l1) linksHtml += `<a class="btn-link" href="${data.l1}" target="_blank">✨ ${data.l1n}</a>`;
      if (data.l2) linksHtml += `<a class="btn-link" href="${data.l2}" target="_blank">🎀 ${data.l2n}</a>`;
      document.getElementById('show-links').innerHTML = linksHtml;
      document.getElementById('unlocked-content').style.display = 'block';
    } catch(e) {
      document.getElementById('error-msg').textContent = '❌ 비밀번호가 틀렸어요!';
      document.getElementById('unlocked-content').style.display = 'none';
    }
  }
</script>
</body>
</html>
